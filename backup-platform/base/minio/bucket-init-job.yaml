apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: openshift-adp
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-minio
          image: busybox
          command:
            - sh
            - -c
            - until nc -z minio 9000; do echo "waiting for minio..."; sleep 3; done
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-env-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-env-secret
                  key: MINIO_ROOT_PASSWORD
          command:
            - sh
            - -c
            - |
              mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
              mc mb --ignore-existing local/openshift-backups
              echo "Bucket openshift-backups ready"
