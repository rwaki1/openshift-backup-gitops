apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: openshift-adp
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio:9000 minioadmin minioadmin
              mc mb --ignore-existing local/openshift-backups
              echo "Bucket openshift-backups ready"
