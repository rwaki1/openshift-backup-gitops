apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: backup-platform
  namespace: flux-system
spec:
  interval: 5m
  path: ./backup-platform/overlays/vsphere
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: backup-operator   # waits for OADP Operator + CRDs before applying DPA
    - name: vso               # waits for VSO before applying VaultStaticSecret CRs
