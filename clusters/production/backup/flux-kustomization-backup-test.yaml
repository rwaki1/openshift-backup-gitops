apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: backup-stack-test
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/production/backup
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: flux-system
  timeout: 5m
  retryInterval: 2m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
