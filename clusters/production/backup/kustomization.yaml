apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./namespace.yaml
  - ./oadp
  - ./velero
  - ./etcd
  - ./secrets

# Patch s3-credentials secret to correct namespace (openshift-adp instead of backup)
patchesJson6902:
  - target:
      kind: Secret
      name: s3-credentials
      namespace: backup
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: openshift-adp
