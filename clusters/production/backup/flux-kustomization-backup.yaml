apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: backup-stack
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/production/backup
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: velero
      namespace: openshift-adp
  timeout: 5m
  retryInterval: 2m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
