# clusters/production/backup/secrets/s3-credentials.yaml
#
# ⚠️  DO NOT COMMIT THIS FILE IN PLAINTEXT ⚠️
#
# Before committing, encrypt with SOPS:
#   sops -e -i clusters/production/backup/secrets/s3-credentials.yaml
#
# SOPS will encrypt only the 'stringData' field values (per .sops.yaml rules).
# Metadata (name, namespace) remains readable.
#
apiVersion: v1
kind: Secret
metadata:
  name: cloud-credentials
  namespace: openshift-adp
  labels:
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  cloud: |
    [default]
    aws_access_key_id=REPLACE_WITH_YOUR_ACCESS_KEY_ID
    aws_secret_access_key=REPLACE_WITH_YOUR_SECRET_ACCESS_KEY
