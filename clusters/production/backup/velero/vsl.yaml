# clusters/production/backup/velero/vsl.yaml
# Required VolumeSnapshotClass for vSphere CSI — Velero auto-discovers via label
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: velero-vsphere-csi
  labels:
    velero.io/csi-volumesnapshot-class: 'true'  # Velero auto-discovers this label
    app.kubernetes.io/managed-by: flux
driver: csi.vsphere.volume
deletionPolicy: Retain  # Keep snapshots even if the VolumeSnapshotClass object is deleted
