# clusters/production/backup/velero/schedules/namespaced-apps-schedule.yaml
# Backs up application namespaces every 4 hours — namespace-scoped resources only
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: namespaced-apps
  namespace: openshift-adp
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  schedule: "0 */4 * * *"    # Every 4 hours on the hour
  template:
    includedNamespaces:
      - production            # ⚠️ Replace/extend with your actual app namespaces
      - staging
      - monitoring
    excludedNamespaces:
      - kube-system           # Skip internal OpenShift namespaces
      - openshift-etcd        # Skip these — they change every second
    includeClusterResources: false  # Do not include ClusterRoles, CRDs, etc.
    storageLocation: default        # Use the BSL named 'default' in our DPA
    ttl: 168h0m0s                   # 7 days retention
    snapshotVolumes: true           # Also snapshot PVs for these namespaces
    volumeSnapshotLocations:
      - csi-vsphere                 # Use the VSL named 'csi-vsphere' in our DPA
