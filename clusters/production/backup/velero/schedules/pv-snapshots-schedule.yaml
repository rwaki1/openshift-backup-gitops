# clusters/production/backup/velero/schedules/pv-snapshots-schedule.yaml
# PersistentVolume-only backup — daily at 1 AM — CSI snapshots stored on vSphere datastore
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: pv-snapshots
  namespace: openshift-adp
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  schedule: "0 1 * * *"    # Daily at 01:00
  template:
    includedResources:
      - persistentvolumeclaims
      - persistentvolumes
    includeClusterResources: true
    storageLocation: default
    ttl: 336h0m0s                   # 14 days retention
    snapshotVolumes: true
    volumeSnapshotLocations:
      - csi-vsphere
