apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: backup-platform
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/crc/backup-platform-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: backup-operator
